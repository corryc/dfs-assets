<style>
:root{--navy:#0d1b2e;--blue:#0052cc;--blue-d:#003d99;--blue-l:#e8f0ff;--teal:#00a896;--teal-l:#e6f7f5;--off:#f5f7fa;--border:#dde3ed;--tx:#0d1b2e;--txm:#3d4f6b;--txl:#6b7c99}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Manrope',sans-serif;color:var(--tx);background:#fff;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);height:68px;display:flex;align-items:center}
.nav-in{max-width:1100px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{height:34px}
.nav-logo-text{font-size:14px;font-weight:800;color:var(--navy);line-height:1.2}
.nav-logo-text span{display:block;font-size:11px;font-weight:500;color:var(--txl)}
.nav-r{display:flex;align-items:center;gap:14px}
.nav-tel{font-size:14px;font-weight:700;color:var(--tx);text-decoration:none}
.btn-nav{background:var(--blue);color:#fff;font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;padding:9px 20px;border-radius:6px;text-decoration:none}
.btn-nav:hover{background:var(--blue-d)}
.hero{background:var(--navy);padding:72px 24px 56px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;right:-40px;width:360px;height:360px;background:radial-gradient(circle,rgba(0,82,204,.2) 0%,transparent 70%);pointer-events:none}
.hero-in{max-width:900px;margin:0 auto;position:relative;z-index:1;text-align:center}
.eyebrow{display:inline-flex;align-items:center;gap:7px;background:rgba(0,82,204,.2);border:1px solid rgba(0,82,204,.35);color:#7eb3ff;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:5px 13px;border-radius:100px;margin-bottom:20px}
.hero h1{font-size:clamp(28px,4.5vw,48px);font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px}
.hero h1 mark{color:#7eb3ff;background:none}
.hero-sub{font-size:16px;color:rgba(255,255,255,.72);line-height:1.7;max-width:560px;margin:0 auto}
.grid{padding:64px 24px 80px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.post{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:28px;text-decoration:none;display:flex;flex-direction:column;transition:border-color .2s,box-shadow .2s,transform .2s}
.post:hover{border-color:rgba(0,82,204,.3);box-shadow:0 6px 24px rgba(0,82,204,.09);transform:translateY(-2px)}
.post-tag{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
.post h2{font-size:17px;font-weight:800;color:var(--navy);line-height:1.35;letter-spacing:-.01em;margin-bottom:10px}
.post p{font-size:13px;color:var(--txm);line-height:1.65;margin:0;flex:1}
.post-arrow{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--blue);margin-top:18px}
.cta-bar{background:var(--blue-l);border-top:1px solid var(--border);padding:48px 24px;text-align:center}
.cta-bar h2{font-size:clamp(20px,3vw,28px);font-weight:800;color:var(--navy);margin-bottom:10px}
.cta-bar p{font-size:15px;color:var(--txm);margin-bottom:22px}
.btn-pri{background:var(--blue);color:#fff;font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;padding:13px 28px;border-radius:7px;text-decoration:none;display:inline-block}
.btn-pri:hover{background:var(--blue-d)}





.foot-links a{font-size:13px;color:rgba(255,255,255,.5);text-decoration:none}
.foot-links a:hover{color:#fff}
@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.grid{grid-template-columns:1fr}.hero{padding:96px 20px 48px}}

<body>

<script src="https://corryc.github.io/dfs-assets/dfs-nav-loader.js"></script>


<section class="hero">

</div>
</section>

<div class="grid" id="blogGrid"></div>

<script>
(function() {
  var grid = document.getElementById('blogGrid');
  if (!grid) return;

  fetch('https://corryc.github.io/dfs-assets/blog-posts.json')
    .then(function(r) { return r.json(); })
    .then(function(posts) {
      // Fisher-Yates shuffle
      for (var i = posts.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = posts[i];
        posts[i] = posts[j];
        posts[j] = tmp;
      }
      var html = posts.map(function(p) {
        return '<a href="' + p.url + '" class="post">' +
          '<div class="post-tag">' + p.tag + '</div>' +
          '<h2>' + p.title + '</h2>' +
          '<p>' + p.description + '</p>' +
          '<div class="post-arrow">Read more â†’</div>' +
          '</a>';
      }).join('');
      grid.innerHTML = html;
    })
    .catch(function(e) {
      console.warn('Blog grid: could not load posts', e);
    });
})();
</script>
