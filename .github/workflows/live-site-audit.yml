name: Live Site Audit

on:
  schedule:
    - cron: '0 20 * * *'  # daily ~6am AEST (20:00 UTC)
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Audit live site against expected structure
        run: python3 scripts/audit_live_site.py
